services:
  sauria:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - '${HOME}/.sauria:/home/sauria/.sauria'
    environment:
      - NODE_ENV=production
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('net').connect('/home/sauria/.sauria/daemon.sock').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
