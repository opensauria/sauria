<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:"
    />
    <title>OpenWind</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      html,
      body {
        background: rgba(30, 30, 30, 0.75) !important;
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .palette {
        width: 100%;
        height: 100%;
        background: rgba(30, 30, 30, 0.75);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Search ─────────────────────── */

      .search-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      }

      .wind-mascot {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        cursor: default;
      }

      .search-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s ease;
      }

      .search-icon:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .search-icon svg {
        width: 16px;
        height: 16px;
      }
      .search-icon.hidden {
        display: none;
      }

      .search-bar input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
      }

      .search-bar input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      /* ── Command list ───────────────── */

      .command-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 6px;
      }

      .command-list::-webkit-scrollbar {
        width: 3px;
      }
      .command-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .command-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
      }

      .command-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px;
        border-radius: 8px;
        cursor: default;
        transition: background 0.08s ease;
        height: 40px;
      }

      .command-row.selected {
        background: rgba(255, 255, 255, 0.08);
      }

      .command-row .icon {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.05);
      }

      .command-row .icon svg {
        width: 16px;
        height: 16px;
      }
      .command-row .label {
        flex: 1;
        font-size: 13px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.85);
      }
      .command-row.selected .label {
        color: #fff;
      }
      .command-row .hint {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.25);
      }

      /* ── Result panel ───────────────── */

      .result-panel {
        display: none;
        border-top: 0.5px solid rgba(255, 255, 255, 0.08);
        padding: 12px 14px;
        max-height: 140px;
        overflow-y: auto;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 11px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.55);
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(0, 0, 0, 0.12);
      }

      .result-panel.visible {
        display: block;
        animation: fadeIn 0.15s ease;
      }

      /* ── Telegram panel ─────────────── */

      .telegram-form {
        display: none;
        border-top: 0.5px solid rgba(255, 255, 255, 0.08);
        padding: 12px;
        background: rgba(0, 0, 0, 0.12);
        animation: fadeIn 0.15s ease;
        flex: 1;
        overflow-y: auto;
      }

      .telegram-form.visible {
        display: flex;
        flex-direction: column;
      }

      .tg-section-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 8px;
        padding: 0 4px;
      }

      /* ── Bot card ────────────────────── */

      .bot-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 0.5px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        margin-bottom: 8px;
        transition: background 0.12s ease;
      }

      .bot-card:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .bot-avatar {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
      }

      .bot-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
      }

      .bot-avatar svg {
        width: 20px;
        height: 20px;
      }

      .bot-info {
        flex: 1;
        min-width: 0;
      }

      .bot-name {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bot-meta {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.35);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
      }

      .bot-status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #34d399;
        flex-shrink: 0;
      }

      .bot-status-dot.offline {
        background: rgba(255, 255, 255, 0.2);
      }

      .bot-actions {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      .bot-action-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s ease;
      }

      .bot-action-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.6);
      }

      .bot-action-btn.danger:hover {
        background: rgba(248, 113, 113, 0.12);
        color: #f87171;
      }

      .bot-action-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── Add bot button ──────────────── */

      .add-bot-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 12px;
        background: transparent;
        border: 1.5px dashed rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: rgba(255, 255, 255, 0.25);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        width: 100%;
        margin-top: 4px;
      }

      .add-bot-btn:hover {
        border-color: rgba(39, 167, 231, 0.3);
        color: rgba(39, 167, 231, 0.7);
        background: rgba(39, 167, 231, 0.04);
      }

      .add-bot-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── Connect form ────────────────── */

      .tg-connect-form {
        display: none;
        margin-top: 8px;
      }
      .tg-connect-form.visible {
        display: block;
        animation: fadeIn 0.15s ease;
      }

      .form-field {
        margin-bottom: 10px;
      }

      .form-field label {
        display: block;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
      }

      .form-field input {
        width: 100%;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 0.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        color: var(--text);
        font-size: 13px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        outline: none;
        transition: border-color 0.15s ease;
        box-sizing: border-box;
      }

      .form-field input:focus {
        border-color: rgba(255, 255, 255, 0.25);
      }
      .form-field input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .form-field .field-hint {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.25);
        margin-top: 4px;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .form-btn {
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .form-btn-primary {
        background: #27a7e7;
        color: white;
      }

      .form-btn-primary:hover {
        background: #1e96d4;
      }

      .form-btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .form-btn-cancel {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.5);
        border: 0.5px solid rgba(255, 255, 255, 0.08);
      }

      .form-btn-cancel:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .form-status {
        font-size: 12px;
        margin-top: 8px;
        display: none;
      }

      .form-status.visible {
        display: block;
      }
      .form-status.error {
        color: #f87171;
      }
      .form-status.success {
        color: #34d399;
      }

      /* ── Footer ─────────────────────── */

      .footer {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-top: 0.5px solid rgba(255, 255, 255, 0.06);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        margin-top: auto;
        flex-shrink: 0;
        min-height: 40px;
      }

      .footer kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        padding: 1px 4px;
        background: rgba(255, 255, 255, 0.06);
        border: 0.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        font-size: 10px;
        font-family: inherit;
        color: rgba(255, 255, 255, 0.35);
      }

      .footer span {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .footer .wind-label {
        margin-left: auto;
        font-weight: 500;
        font-size: 10px;
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.2);
      }

      /* ── Provider status ────────────── */

      .provider-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.35);
      }

      .pulse-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #34d399;
        flex-shrink: 0;
        animation: pulse 2s ease-in-out infinite;
      }

      .pulse-dot.offline {
        background: rgba(255, 255, 255, 0.15);
        animation: none;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
        50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(52, 211, 153, 0); }
      }

      .empty-state {
        padding: 24px;
        text-align: center;
        color: rgba(255, 255, 255, 0.25);
        font-size: 13px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="palette">
      <div class="search-bar">
        <svg class="wind-mascot" id="mascot" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 3C8 3 5 6.5 5 11c0 3 1.5 5.5 4 7l.5 2c.2.4.6.2.7 0L12 17.5l1.8 2.5c.1.2.5.4.7 0l.5-2c2.5-1.5 4-4 4-7 0-4.5-3-8-7-8z"
            fill="#38bdf8"
            stroke="#075985"
            stroke-width="0.8"
          />
          <path
            d="M8.5 6L7 3.5c-.1-.3.2-.4.4-.1L9 5.5"
            fill="#fb923c"
            stroke="#9a3412"
            stroke-width="0.6"
          />
          <path
            d="M15.5 6l1.5-2.5c.1-.3-.2-.4-.4-.1L15 5.5"
            fill="#fb923c"
            stroke="#9a3412"
            stroke-width="0.6"
          />
          <ellipse
            cx="9.5"
            cy="10.5"
            rx="1.8"
            ry="2.2"
            fill="white"
            stroke="#075985"
            stroke-width="0.6"
          />
          <ellipse
            cx="14.5"
            cy="10.5"
            rx="1.8"
            ry="2.2"
            fill="white"
            stroke="#075985"
            stroke-width="0.6"
          />
          <ellipse cx="10" cy="10.5" rx="0.9" ry="1.3" fill="#0f172a" />
          <ellipse cx="15" cy="10.5" rx="0.9" ry="1.3" fill="#0f172a" />
          <circle cx="10.5" cy="9.8" r="0.4" fill="white" />
          <circle cx="15.5" cy="9.8" r="0.4" fill="white" />
          <path
            d="M11 14c.3.3.6.4 1 .4s.7-.1 1-.4"
            stroke="#075985"
            stroke-width="0.7"
            stroke-linecap="round"
            fill="none"
          />
        </svg>
        <div class="search-icon hidden" id="back-btn">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M15 18l-6-6 6-6"
              stroke="rgba(255,255,255,0.5)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <input type="text" id="search" placeholder="Search commands..." autofocus />
      </div>
      <div class="command-list" id="command-list"></div>
      <div class="empty-state" id="empty-state">No matching commands</div>
      <div class="result-panel" id="result-panel"></div>

      <!-- Telegram panel -->
      <div class="telegram-form" id="telegram-form">
        <div class="tg-section-title">Connected Bots</div>

        <!-- Bot cards container -->
        <div id="tg-bot-list"></div>

        <!-- Add bot button -->
        <button class="add-bot-btn" id="tg-add-btn">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M12 5v14M5 12h14"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          Add Bot
        </button>

        <!-- Connect form (hidden by default) -->
        <div class="tg-connect-form" id="tg-form-fields">
          <div class="form-field">
            <label>Your User ID</label>
            <input type="text" id="tg-userid" placeholder="123456789" inputmode="numeric" autocomplete="off" />
            <div class="field-hint">Get from @userinfobot on Telegram</div>
          </div>
          <div class="form-field">
            <label>Bot Token</label>
            <input type="password" id="tg-token" placeholder="123456:ABC-DEF..." />
            <div class="field-hint">Get from @BotFather on Telegram</div>
          </div>
          <div class="form-status" id="tg-status"></div>
          <div class="form-actions">
            <button class="form-btn form-btn-cancel" id="tg-cancel">Cancel</button>
            <button class="form-btn form-btn-primary" id="tg-submit" disabled>Connect</button>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="provider-status" id="provider-status">
          <span class="pulse-dot offline"></span>
          <span id="provider-label">No provider</span>
        </div>
        <span><kbd>&uarr;</kbd><kbd>&darr;</kbd></span>
        <span><kbd>&crarr;</kbd> Run</span>
        <span><kbd>esc</kbd></span>
        <span class="wind-label">OpenWind</span>
      </div>
    </div>

    <script>
      var icons = {
        canvas:
          '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><rect x="8" y="14" width="7" height="7" rx="1.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M10 6.5h4M17.5 10v4M11.5 14v-4" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/></svg>',
        status:
          '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        telegram:
          '<svg viewBox="0 0 24 24"><path d="M9.04 15.6l-.39 5.36c.56 0 .8-.24 1.1-.52l2.63-2.5 5.45 3.97c1 .55 1.7.26 1.97-.92l3.57-16.67C23.71 2.7 22.85 2.14 21.9 2.5L1.4 10.17c-1.63.64-1.6 1.56-.28 1.98l5.1 1.58L19.5 5.8c.6-.38 1.15-.17.7.2L9.04 15.6z" fill="#27A7E7"/></svg>',
        setup:
          '<svg viewBox="0 0 24 24" fill="none"><path d="M12 2a3 3 0 00-3 3v1a3 3 0 006 0V5a3 3 0 00-3-3z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M19 9h-2a3 3 0 000 6h2a3 3 0 000-6z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M5 15h2a3 3 0 000-6H5a3 3 0 000 6z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M12 18a3 3 0 00-3 3M12 18a3 3 0 013 3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg>',
        audit:
          '<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="2" width="14" height="20" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><path d="M9 7h6M9 11h6M9 15h4" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg>',
        doctor:
          '<svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-5.75-7-10.25A4.5 4.5 0 0112 6a4.5 4.5 0 017 3.75C19 14.25 12 20 12 20z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 10v4M10 12h4" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/></svg>',
        docs: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        quit: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3v9" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/><path d="M18.36 6.64A9 9 0 0112 21a9 9 0 01-6.36-2.36A9 9 0 015.64 6.64" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg>',
      };

      var commands = [
        { id: 'canvas', label: 'Agent Canvas', hint: '' },
        { id: 'telegram', label: 'Telegram', hint: 'channel' },
        { id: 'setup', label: 'AI Provider', hint: 'config' },
        { id: 'status', label: 'Status', hint: 'system' },
        { id: 'doctor', label: 'Health Check', hint: 'system' },
        { id: 'audit', label: 'Audit Log', hint: 'security' },
        { id: 'docs', label: 'Documentation', hint: 'help' },
        { id: 'quit', label: 'Quit', hint: '' },
      ];

      var inSubView = false;
      var selectedIndex = 0;
      var filtered = commands.slice();
      var searchEl = document.getElementById('search');
      var listEl = document.getElementById('command-list');
      var emptyEl = document.getElementById('empty-state');
      var resultEl = document.getElementById('result-panel');
      var mascotEl = document.getElementById('mascot');
      var backBtn = document.getElementById('back-btn');
      var tgForm = document.getElementById('telegram-form');
      var tgBotList = document.getElementById('tg-bot-list');
      var tgAddBtn = document.getElementById('tg-add-btn');
      var tgFormFields = document.getElementById('tg-form-fields');
      var tgToken = document.getElementById('tg-token');
      var tgUserId = document.getElementById('tg-userid');
      var tgSubmit = document.getElementById('tg-submit');
      var tgCancel = document.getElementById('tg-cancel');
      var tgStatus = document.getElementById('tg-status');

      function render() {
        var query = searchEl.value.toLowerCase();
        filtered = commands.filter(function (c) {
          return (
            c.label.toLowerCase().includes(query) ||
            c.hint.toLowerCase().includes(query) ||
            c.id.includes(query)
          );
        });
        if (selectedIndex >= filtered.length) selectedIndex = Math.max(0, filtered.length - 1);
        if (filtered.length === 0) {
          listEl.style.display = 'none';
          emptyEl.style.display = 'block';
          return;
        }
        listEl.style.display = 'block';
        emptyEl.style.display = 'none';
        listEl.innerHTML = filtered
          .map(function (c, i) {
            var cls = 'command-row' + (i === selectedIndex ? ' selected' : '');
            return (
              '<div class="' +
              cls +
              '" data-index="' +
              i +
              '">' +
              '<div class="icon">' +
              icons[c.id] +
              '</div>' +
              '<div class="label">' +
              c.label +
              '</div>' +
              '<div class="hint">' +
              c.hint +
              '</div>' +
              '</div>'
            );
          })
          .join('');
      }

      function enterSubView() {
        inSubView = true;
        mascotEl.style.display = 'none';
        backBtn.classList.remove('hidden');
      }

      function exitSubView() {
        inSubView = false;
        mascotEl.style.display = '';
        backBtn.classList.add('hidden');
        tgForm.className = 'telegram-form';
        resultEl.className = 'result-panel';
        render();
        searchEl.focus();
      }

      function executeSelected() {
        if (filtered.length === 0) return;
        var cmd = filtered[selectedIndex];
        window.openwind.executeCommand(cmd.id);
      }

      var tgIconSvg =
        '<svg viewBox="0 0 24 24"><path d="M9.04 15.6l-.39 5.36c.56 0 .8-.24 1.1-.52l2.63-2.5 5.45 3.97c1 .55 1.7.26 1.97-.92l3.57-16.67C23.71 2.7 22.85 2.14 21.9 2.5L1.4 10.17c-1.63.64-1.6 1.56-.28 1.98l5.1 1.58L19.5 5.8c.6-.38 1.15-.17.7.2L9.04 15.6z" fill="#27A7E7"/></svg>';
      var trashSvg =
        '<svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      function renderBotCard(bot) {
        var photo = bot.photo || (bot.profile && bot.profile.photo);
        var photoHtml = photo ? '<img src="' + photo + '" alt="" />' : tgIconSvg;
        var name = bot.label || (bot.profile ? '@' + bot.profile.username : 'Telegram Bot');
        var isOnline = bot.connected;
        var dotClass = isOnline ? 'bot-status-dot' : 'bot-status-dot offline';
        var statusText = isOnline ? 'Online' : 'Offline';
        var nodeId = bot.nodeId || '';

        return (
          '<div class="bot-card" data-node-id="' + nodeId + '">' +
          '<div class="bot-avatar">' +
          photoHtml +
          '</div>' +
          '<div class="bot-info">' +
          '<div class="bot-name">' +
          name +
          '</div>' +
          '<div class="bot-meta">' +
          '<span class="' +
          dotClass +
          '"></span>' +
          statusText +
          '</div>' +
          '</div>' +
          '<div class="bot-actions">' +
          '<button class="bot-action-btn danger tg-disconnect-btn" data-node-id="' + nodeId + '" title="Disconnect">' +
          trashSvg +
          '</button>' +
          '</div>' +
          '</div>'
        );
      }

      async function showTelegramForm() {
        listEl.style.display = 'none';
        emptyEl.style.display = 'none';
        resultEl.className = 'result-panel';
        tgForm.className = 'telegram-form visible';
        enterSubView();

        var status = await window.openwind.getTelegramStatus();
        var bots = status.bots || [];
        var connectedBots = bots.filter(function (b) { return b.connected; });

        if (connectedBots.length > 0) {
          tgBotList.innerHTML = connectedBots.map(renderBotCard).join('');
          tgFormFields.className = 'tg-connect-form';
          tgAddBtn.style.display = '';

          // Bind disconnect buttons
          var discBtns = tgBotList.querySelectorAll('.tg-disconnect-btn');
          discBtns.forEach(function (btn) {
            btn.addEventListener('mousedown', async function (e) {
              e.preventDefault();
              var nid = btn.getAttribute('data-node-id');
              if (nid) {
                await window.openwind.disconnectChannel('telegram', nid);
                showTelegramForm();
              }
            });
          });
        } else {
          tgBotList.innerHTML = '';
          tgAddBtn.style.display = 'none';
          tgFormFields.className = 'tg-connect-form visible';
          tgToken.value = '';
          tgUserId.value = '';
          tgStatus.className = 'form-status';
          tgSubmit.disabled = true;
          tgUserId.focus();
        }
      }

      function hideTelegramForm() {
        exitSubView();
      }

      function showConnectForm() {
        tgFormFields.className = 'tg-connect-form visible';
        tgAddBtn.style.display = 'none';
        tgToken.value = '';
        tgUserId.value = '';
        tgStatus.className = 'form-status';
        tgSubmit.disabled = true;
        tgUserId.focus();
      }

      function validateTgForm() {
        var hasToken = tgToken.value.trim().length > 0;
        var hasId = tgUserId.value.trim().length > 0;
        tgSubmit.disabled = !(hasToken && hasId);
      }

      tgToken.addEventListener('input', validateTgForm);
      tgToken.addEventListener('keyup', validateTgForm);
      tgUserId.addEventListener('input', validateTgForm);
      tgUserId.addEventListener('keyup', validateTgForm);
      tgAddBtn.addEventListener('mousedown', function (e) {
        e.preventDefault();
        showConnectForm();
      });
      tgCancel.addEventListener('mousedown', function (e) {
        e.preventDefault();
        hideTelegramForm();
      });

      tgSubmit.addEventListener('mousedown', async function (e) {
        e.preventDefault();
        if (tgSubmit.disabled) return;

        var rawId = tgUserId.value.trim().replace(/\D/g, '');
        var parsedId = parseInt(rawId, 10);
        if (!rawId || isNaN(parsedId) || parsedId <= 0) {
          tgStatus.textContent = 'User ID must be a number (get it from @userinfobot)';
          tgStatus.className = 'form-status visible error';
          tgUserId.focus();
          return;
        }

        tgSubmit.disabled = true;
        tgStatus.textContent = 'Connecting...';
        tgStatus.className = 'form-status visible';
        try {
          var result = await window.openwind.connectChannel('telegram', {
            token: tgToken.value.trim(),
            userId: parsedId,
          });
          if (result.success) {
            tgStatus.textContent = 'Connected to @' + result.botUsername;
            tgStatus.className = 'form-status visible success';
            setTimeout(function () {
              showTelegramForm();
            }, 1000);
          } else {
            tgStatus.textContent = result.error;
            tgStatus.className = 'form-status visible error';
            tgSubmit.disabled = false;
          }
        } catch (err) {
          tgStatus.textContent = 'Connection failed';
          tgStatus.className = 'form-status visible error';
          tgSubmit.disabled = false;
        }
      });

      /* Prevent Escape/keyboard nav inside the form from doing command stuff */
      tgForm.addEventListener('keydown', function (e) {
        e.stopPropagation();
        if (e.key === 'Escape') {
          e.preventDefault();
          hideTelegramForm();
        } else if (e.key === 'Enter' && !tgSubmit.disabled) {
          e.preventDefault();
          tgSubmit.dispatchEvent(new MouseEvent('mousedown'));
        }
      });

      backBtn.addEventListener('mousedown', function (e) {
        e.preventDefault();
        exitSubView();
      });

      searchEl.addEventListener('input', function () {
        selectedIndex = 0;
        if (inSubView) exitSubView();
        render();
      });

      document.addEventListener('keydown', function (e) {
        if (tgForm.classList.contains('visible')) return;
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (filtered.length > 0) {
            selectedIndex = (selectedIndex + 1) % filtered.length;
            render();
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (filtered.length > 0) {
            selectedIndex = (selectedIndex - 1 + filtered.length) % filtered.length;
            render();
          }
        } else if (e.key === 'Enter') {
          e.preventDefault();
          executeSelected();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          if (inSubView) {
            exitSubView();
          } else if (searchEl.value !== '') {
            searchEl.value = '';
            selectedIndex = 0;
            render();
          } else {
            window.openwind.hidePalette();
          }
        }
      });

      listEl.addEventListener('mousedown', function (e) {
        var row = e.target.closest('.command-row');
        if (!row) return;
        e.preventDefault();
        selectedIndex = parseInt(row.dataset.index, 10);
        render();
        executeSelected();
      });

      listEl.addEventListener('mousemove', function (e) {
        var row = e.target.closest('.command-row');
        if (!row) return;
        var idx = parseInt(row.dataset.index, 10);
        if (idx !== selectedIndex) {
          selectedIndex = idx;
          render();
        }
      });

      window.openwind.onCommandResult(function (result) {
        resultEl.className = 'result-panel visible';
        resultEl.textContent = result;
        enterSubView();
      });

      window.openwind.onShowTelegramForm(function () {
        showTelegramForm();
      });

      window.openwind.onPaletteShow(function () {
        refreshProviderStatus();
        if (tgForm.classList.contains('visible')) {
          var firstEmpty = !tgUserId.value.trim()
            ? tgUserId
            : !tgToken.value.trim()
              ? tgToken
              : tgUserId;
          firstEmpty.focus();
        } else {
          searchEl.focus();
        }
      });

      window.openwind.onPaletteReset(function () {
        searchEl.value = '';
        selectedIndex = 0;
        resultEl.className = 'result-panel';
        tgForm.className = 'telegram-form';
        render();
        searchEl.focus();
      });

      render();

      function refreshProviderStatus() {
        window.openwind.getStatus().then(function (status) {
          var dot = document.querySelector('#provider-status .pulse-dot');
          var label = document.getElementById('provider-label');
          if (status.connected && status.provider) {
            dot.className = 'pulse-dot';
            var method = status.authMethod === 'oauth' ? 'subscription' : 'API key';
            label.textContent = status.provider + ' (' + method + ')';
          } else {
            dot.className = 'pulse-dot offline';
            label.textContent = 'No provider';
          }
        });
      }

      refreshProviderStatus();

      window.openwind.getTelegramStatus().then(function (status) {
        var tgCmd = commands.find(function (c) {
          return c.id === 'telegram';
        });
        if (!tgCmd) return;
        var bots = status.bots || [];
        var count = bots.filter(function (b) { return b.connected; }).length;
        if (count > 0) {
          tgCmd.hint = count === 1 ? 'connected' : count + ' bots';
          render();
        }
      });
    </script>
  </body>
</html>
