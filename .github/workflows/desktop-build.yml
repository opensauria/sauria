name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: universal
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build shared packages first
      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      # Build the daemon
      - name: Build daemon
        run: pnpm --filter @openwind/daemon run build

      # Build desktop app
      - name: Build desktop
        working-directory: apps/desktop
        run: pnpm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwind-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.exe
            apps/desktop/out/make/**/*.deb
            apps/desktop/out/make/**/*.rpm
            apps/desktop/out/make/**/*.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
