name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2026.3.8)'
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='./packages/*' --filter=sauria

      - name: Format check
        run: pnpm run format:check

      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Security scan
        run: |
          BANNED=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )
          FOUND=0
          for p in "${BANNED[@]}"; do
            if grep -rn --include="*.ts" \
              "--exclude=*banned-patterns*" "--exclude=*whatsapp*" \
              "--exclude=*transcription*" "--exclude=*vault-key*" \
              "--exclude=*resolve*" "--exclude=*machine-id*" \
              "--exclude=*daemon-ipc*" \
              "$p" apps/daemon/src/ packages/; then
              echo "::error::Banned pattern: $p"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi

      - name: Test
        run: pnpm --filter sauria run test

      - name: Build daemon
        run: pnpm turbo run build --filter='./packages/*' --filter=sauria

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='./packages/*' --filter=sauria

      - name: Publish with trusted publishing
        working-directory: apps/daemon
        run: npm publish --provenance --access public

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: apps/daemon
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/daemon/dist/index.mjs

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.RELEASE_TAG }}
          path: sbom.spdx.json
          retention-days: 90

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ env.RELEASE_TAG }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          make_latest: true
          files: sbom.spdx.json
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ---

            Published to npm: [`sauria@${{ env.RELEASE_TAG }}`](https://www.npmjs.com/package/sauria)

            ```bash
            npm install -g sauria@${{ env.RELEASE_TAG }}
            ```

            ### Verification

            This release includes npm provenance attestation and an SPDX SBOM.

            ```bash
            npm audit signatures
            ```
