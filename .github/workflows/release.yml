name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Create tag
    if: startsWith(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag from .release-version
        id: tag
        run: |
          TAG=$(cat .release-version)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='./packages/*' --filter=@sauria/cli

      - name: Format check
        run: pnpm run format:check

      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Security scan
        run: |
          BANNED=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )
          FOUND=0
          for p in "${BANNED[@]}"; do
            if grep -rn --include="*.ts" \
              "--exclude=*banned-patterns*" "--exclude=*whatsapp*" \
              "--exclude=*transcription*" "--exclude=*vault-key*" \
              "--exclude=*resolve*" "--exclude=*machine-id*" \
              "--exclude=*daemon-ipc*" \
              "$p" apps/daemon/src/ packages/; then
              echo "::error::Banned pattern: $p"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi

      - name: Test
        run: pnpm --filter @sauria/cli run test

      - name: Build daemon
        run: pnpm turbo run build --filter='./packages/*' --filter=@sauria/cli

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release, verify]
    environment: production
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='./packages/*' --filter=@sauria/cli

      - name: Copy README for npm
        run: cp README.md apps/daemon/README.md

      - name: Publish with trusted publishing
        working-directory: apps/daemon
        run: npm publish --provenance --access public

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: apps/daemon
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/daemon/dist/index.mjs

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.release.outputs.tag }}
          path: sbom.spdx.json
          retention-days: 90

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [release, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.release.outputs.tag }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: sbom.spdx.json
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ---

            Published to npm: [`@sauria/cli@${{ needs.release.outputs.tag }}`](https://www.npmjs.com/package/@sauria/cli)

            ```bash
            npm install -g @sauria/cli@${{ needs.release.outputs.tag }}
            ```

            ### Verification

            This release includes npm provenance attestation and an SPDX SBOM.

            ```bash
            npm audit signatures
            ```
