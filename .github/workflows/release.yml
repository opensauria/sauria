name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ── Create tag from .release-version ───────────
  release:
    name: Create tag
    if: "startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag from .release-version
        id: tag
        run: |
          TAG=$(cat .release-version)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

  # ── Verify ─────────────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='./packages/*' --filter=@sauria/cli

      - name: Format check
        run: pnpm run format:check

      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Security scan
        run: |
          BANNED=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )
          # Files that legitimately contain banned patterns:
          # - banned-patterns.ts: defines the pattern list (contains string literals)
          # - whatsapp.ts: WhatsApp Business API webhook server (localhost-only)
          # - transcription.ts: execFile for Whisper voice transcription subprocess
          # - vault-key.ts: execSync for hardware UUID detection (ioreg)
          # - resolve.ts: execSync for API key resolution
          # - machine-id.ts: execSync for hardware UUID detection
          FOUND=0
          for pattern in "${BANNED[@]}"; do
            if grep -rn --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules \
              "--exclude=*banned-patterns*" "--exclude=*whatsapp*" \
              "--exclude=*transcription*" "--exclude=*vault-key*" \
              "--exclude=*resolve*" "--exclude=*machine-id*" \
              "--exclude=*daemon-ipc*" \
              "$pattern" apps/daemon/src/ packages/; then
              echo "::error::Banned pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Security scan failed."
            exit 1
          fi
          echo "Security scan passed."

      - name: Test
        run: pnpm --filter @sauria/cli run test

      - name: Build daemon
        run: pnpm turbo run build --filter='./packages/*' --filter=@sauria/cli

      - name: Validate version
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          TAG="${TAG#v}"
          DAEMON_V=$(node -p "require('./apps/daemon/package.json').version")
          DESKTOP_V=$(node -p "require('./apps/desktop/package.json').version")
          CARGO_V=$(grep '^version' apps/desktop/src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MISMATCH=0
          for name_ver in "daemon:$DAEMON_V" "desktop:$DESKTOP_V" "cargo:$CARGO_V"; do
            NAME="${name_ver%%:*}"
            VER="${name_ver##*:}"
            if [ "$VER" != "$TAG" ]; then
              echo "::error::$NAME version ($VER) does not match tag ($TAG)"
              MISMATCH=1
            fi
          done
          if [ "$MISMATCH" -eq 1 ]; then exit 1; fi

  # ── npm publish ────────────────────────────────
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release, verify]
    environment: production
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='./packages/*' --filter=@sauria/cli

      - name: Publish with trusted publishing
        working-directory: apps/daemon
        run: npm publish --provenance --access public

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: apps/daemon
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/daemon/dist/index.mjs

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.release.outputs.tag }}
          path: sbom.spdx.json
          retention-days: 90

  # ── Desktop builds (cross-platform) ───────────
  desktop:
    needs: [release, verify]
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: universal
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Desktop (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Import Apple certificate
        if: matrix.platform == 'darwin'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Build daemon
        run: pnpm --filter @sauria/cli run build

      - name: Build desktop
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sauria-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.dmg
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.sig
            apps/desktop/src-tauri/target/release/bundle/**/latest.json

  # ── GitHub Release ─────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [release, npm-publish, desktop]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.release.outputs.tag }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: sbom.spdx.json
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ---

            Published to npm: [`@sauria/cli@${{ needs.release.outputs.tag }}`](https://www.npmjs.com/package/@sauria/cli)

            ```bash
            npm install -g @sauria/cli@${{ needs.release.outputs.tag }}
            ```

            ### Desktop

            Download the desktop app for your platform from the assets below.

            ### Verification

            This release includes npm provenance attestation and an SPDX SBOM.

            ```bash
            npm audit signatures
            ```
