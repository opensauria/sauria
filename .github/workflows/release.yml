name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Format check
        run: pnpm run format:check

      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Security scan
        run: |
          BANNED=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )
          FOUND=0
          for p in "${BANNED[@]}"; do
            if grep -rn --include="*.ts" \
              "--exclude=*banned-patterns*" "--exclude=*whatsapp*" \
              "--exclude=*transcription*" "--exclude=*vault-key*" \
              "--exclude=*resolve*" "--exclude=*machine-id*" \
              "$p" apps/daemon/src/ packages/; then
              echo "::error::Banned pattern: $p"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi

      - name: Test
        run: pnpm --filter @sauria/daemon run test

      - name: Build
        run: pnpm turbo run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./apps/daemon/package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build

      - name: Publish
        working-directory: apps/daemon
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ---

            Published to npm: [`@sauria/daemon@${{ github.ref_name }}`](https://www.npmjs.com/package/@sauria/daemon)

            ```bash
            npm install -g @sauria/daemon@${{ github.ref_name }}
            ```
