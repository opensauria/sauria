name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Typecheck & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Format check
        run: npx prettier --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx vitest run

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Banned pattern scan
        run: |
          BANNED=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )
          # Files that legitimately contain banned patterns:
          # - banned-patterns.ts: defines the pattern list (contains string literals)
          # - whatsapp.ts: WhatsApp Business API webhook server (localhost-only)
          FOUND=0
          for pattern in "${BANNED[@]}"; do
            if grep -rn --include="*.ts" --include="*.js" "--exclude=*banned-patterns*" "--exclude=*whatsapp*" "$pattern" src/; then
              echo "::error::Banned pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Security scan failed."
            exit 1
          fi
          echo "Security scan passed."
