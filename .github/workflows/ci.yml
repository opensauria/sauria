name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  lint:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx vitest run

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for banned patterns
        run: |
          BANNED_PATTERNS=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )

          FOUND=0

          for pattern in "${BANNED_PATTERNS[@]}"; do
            if grep -rn --include="*.ts" --include="*.js" "$pattern" src/; then
              echo "::error::Banned pattern found: $pattern"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Security scan failed. Remove banned patterns from src/."
            exit 1
          fi

          echo "Security scan passed. No banned patterns found."
