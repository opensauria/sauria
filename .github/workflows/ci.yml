name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Typecheck & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Format check
        run: pnpm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - run: pnpm --filter @sauria/cli run test

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Banned pattern scan
        run: |
          BANNED=(
            "child_process"
            "eval("
            "Function("
            "vm.run"
            "createServer"
            ".listen("
          )
          # Files that legitimately contain banned patterns:
          # - banned-patterns.ts: defines the pattern list (contains string literals)
          # - whatsapp.ts: WhatsApp Business API webhook server (localhost-only)
          # - transcription.ts: execFile for Whisper voice transcription subprocess
          # - vault-key.ts: execSync for hardware UUID detection (ioreg)
          # - resolve.ts: execSync for API key resolution
          # - machine-id.ts: execSync for hardware UUID detection
          FOUND=0
          for pattern in "${BANNED[@]}"; do
            if grep -rn --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules \
              "--exclude=*banned-patterns*" "--exclude=*whatsapp*" \
              "--exclude=*transcription*" "--exclude=*vault-key*" \
              "--exclude=*resolve*" "--exclude=*machine-id*" \
              "--exclude=*daemon-ipc*" \
              "--exclude=*claude-code-service*" \
              "$pattern" apps/daemon/src/ packages/; then
              echo "::error::Banned pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Security scan failed."
            exit 1
          fi
          echo "Security scan passed."
