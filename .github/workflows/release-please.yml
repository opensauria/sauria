name: Release PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: version
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          MDD=$(( MONTH * 100 + DAY ))
          BASE="v${YEAR}.${MDD}"
          PATCH=0
          CURRENT=$(cat .release-version 2>/dev/null || echo "")
          TAG="${BASE}.${PATCH}"
          while git tag -l "${TAG}" | grep -q . || [ "${TAG}" = "${CURRENT}" ]; do
            PATCH=$((PATCH + 1))
            TAG="${BASE}.${PATCH}"
          done
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-decorate)
          else
            LOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.log }}
        run: |
          BRANCH="release/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"

          # Update version in package.json files
          for f in package.json apps/daemon/package.json apps/desktop/package.json; do
            if [ -f "$f" ]; then
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" "$f"
            fi
          done

          # Update Cargo.toml
          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" apps/desktop/src-tauri/Cargo.toml
          fi

          # Always create a diff by writing the release tag to a tracking file
          echo "${TAG}" > .release-version
          git add -A
          git commit -m "chore: release ${TAG}"
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: release ${TAG}" \
            --body "$(cat <<PREOF
          ## Release ${TAG}

          ### Changes since last release

          ${CHANGELOG}

          ---

          Merging this PR will automatically create the \`${TAG}\` tag and trigger the publish workflow.
          PREOF
          )"
