<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OpenSauria &mdash; Brain</title>
    <link rel="stylesheet" href="../shared.css" />
    <link rel="stylesheet" href="./brain.css" />
  </head>
  <body>
    <div class="brain-layout">
      <!-- Sidebar -->
      <nav class="brain-sidebar">
        <button class="palette-back" id="palette-back" title="Back">
          <img src="/icons/chevron-left.svg" alt="" />
        </button>

        <div class="brain-sidebar-section">
          <button class="brain-nav-item" data-view="graph">
            <span class="icon-mono" style="--icon: url(/icons/share-2.svg)"></span>
            Graph
          </button>
        </div>

        <div class="brain-sidebar-section">
          <div class="brain-sidebar-section-label">Knowledge</div>
          <button class="brain-nav-item active" data-view="entities">
            <span class="icon-mono" style="--icon: url(/icons/user.svg)"></span>
            Entities
            <span class="brain-nav-count" id="nav-count-entities">0</span>
          </button>
          <button class="brain-nav-item" data-view="relations">
            <span class="icon-mono" style="--icon: url(/icons/link.svg)"></span>
            Relations
            <span class="brain-nav-count" id="nav-count-relations">0</span>
          </button>
          <button class="brain-nav-item" data-view="events">
            <span class="icon-mono" style="--icon: url(/icons/calendar.svg)"></span>
            Events
            <span class="brain-nav-count" id="nav-count-events">0</span>
          </button>
          <button class="brain-nav-item" data-view="observations">
            <span class="icon-mono" style="--icon: url(/icons/lightbulb.svg)"></span>
            Observations
            <span class="brain-nav-count" id="nav-count-observations">0</span>
          </button>
        </div>

        <div class="brain-sidebar-section">
          <div class="brain-sidebar-section-label">Activity</div>
          <button class="brain-nav-item" data-view="conversations">
            <span class="icon-mono" style="--icon: url(/icons/message-square.svg)"></span>
            Conversations
            <span class="brain-nav-count" id="nav-count-conversations">0</span>
          </button>
          <button class="brain-nav-item" data-view="facts">
            <span class="icon-mono" style="--icon: url(/icons/brain.svg)"></span>
            Agent Memory
            <span class="brain-nav-count" id="nav-count-facts">0</span>
          </button>
        </div>
      </nav>

      <!-- Content Area -->
      <main class="brain-content" id="brain-content">
        <!-- Toolbar -->
        <div class="brain-toolbar">
          <div class="brain-search">
            <img src="/icons/search.svg" alt="" />
            <input type="text" id="search-input" placeholder="Search..." />
          </div>
          <select class="brain-filter" id="filter-select" style="display: none">
            <option value="">All types</option>
          </select>
        </div>

        <!-- Stats Bar -->
        <div class="brain-stats" id="stats-bar"></div>

        <!-- Graph Container -->
        <div class="brain-graph-wrap" id="graph-wrap" style="display: none">
          <!-- View toggle (segmented control, top center) -->
          <div class="brain-view-toggle" id="view-toggle">
            <div class="brain-view-highlight" id="view-highlight"></div>
            <button class="brain-view-seg active" data-mode="brain">Brain</button>
            <button class="brain-view-seg" data-mode="library">Library</button>
          </div>

          <!-- 3D Brain view -->
          <div id="brain-3d-container"></div>
          <div id="brain-3d-tooltip"></div>

          <div class="brain-graph-empty" id="graph-empty" style="display: none">
            <img class="icon-mono" src="/icons/share-2.svg" alt="" />
            <div>No entities yet</div>
            <div style="font-size: 12px">
              Connect an agent and start a conversation to see your knowledge graph
            </div>
          </div>

          <!-- Library view (cover flow) -->
          <div class="brain-library" id="library-view" style="display: none">
            <div class="brain-library-track" id="library-track" style="perspective: 1200px"></div>
            <div class="brain-library-empty" id="library-empty" style="display: none">
              <img class="icon-mono" src="/icons/database.svg" alt="" />
              <div>No entities yet</div>
              <div style="font-size: 12px">
                Entities will appear here as OpenSauria learns from your conversations
              </div>
            </div>
            <div class="brain-library-search" id="library-search">
              <img class="icon-mono" src="/icons/search.svg" alt="" />
              <input type="text" id="library-search-input" placeholder="Search entities..." />
            </div>
          </div>

          <div class="brain-graph-stats" id="graph-stats"></div>
        </div>

        <!-- Table Container -->
        <div class="brain-table-wrap" id="table-wrap">
          <table class="brain-table" id="data-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
          <div class="brain-empty" id="empty-state" style="display: none">
            <img src="/icons/database.svg" alt="" />
            <div>No data yet</div>
            <div style="font-size: 12px">
              This will fill up as OpenSauria learns from your conversations
            </div>
          </div>
          <div class="brain-load-more" id="load-more" style="display: none">
            <button id="load-more-btn">Load more</button>
          </div>
        </div>
      </main>

      <!-- Detail Panel -->
      <aside class="brain-detail" id="detail-panel">
        <div class="brain-detail-header">
          <span class="brain-detail-title" id="detail-title"></span>
          <button class="brain-detail-close" id="detail-close" aria-label="Close">
            <img src="/icons/x.svg" alt="Close" />
          </button>
        </div>
        <div class="brain-detail-body" id="detail-body"></div>
        <div class="brain-detail-actions" id="detail-actions">
          <button class="btn btn-danger" id="detail-delete">Delete</button>
        </div>
      </aside>
    </div>

    <!-- Delete Confirmation Dialog -->
    <div class="brain-dialog-overlay" id="delete-dialog">
      <div class="brain-dialog">
        <div class="brain-dialog-title">Confirm Delete</div>
        <div class="brain-dialog-text" id="delete-dialog-text"></div>
        <div class="brain-dialog-warning" id="delete-dialog-warning"></div>
        <div class="brain-dialog-actions">
          <button class="btn btn-secondary" id="delete-cancel">Cancel</button>
          <button class="btn btn-danger" id="delete-confirm">Delete</button>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
