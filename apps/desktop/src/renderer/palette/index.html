<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sauria</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
      html,
      body {
        background: transparent !important;
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden;
      }

      .palette {
        width: 100%;
        height: 100%;
        background: rgba(30, 30, 30, 0.85);
        -webkit-backdrop-filter: blur(40px);
        backdrop-filter: blur(40px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-radius: var(--radius);
        border: 0.5px solid rgba(255, 255, 255, 0.1);
      }

      /* ── Search ─────────────────────── */

      .search-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 0.5px solid var(--border);
      }

      .search-icon {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        cursor: pointer;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s ease;
      }

      .search-icon:hover {
        background: var(--border);
      }
      .search-icon svg {
        width: 16px;
        height: 16px;
      }
      .search-icon.hidden {
        display: none;
      }

      .search-bar input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-size: var(--font-size-base);
        font-family: inherit;
      }

      .search-bar input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      /* ── Command list ───────────────── */

      .command-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 6px;
      }

      .command-list::-webkit-scrollbar {
        width: 3px;
      }
      .command-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .command-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .command-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        cursor: default;
        transition: background 0.08s ease;
        height: 40px;
      }

      .command-row.selected {
        background: var(--border);
      }

      .command-row .icon {
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.05);
      }

      .command-row .icon svg {
        width: 16px;
        height: 16px;
      }
      .command-row .label {
        flex: 1;
        font-size: var(--font-size-label);
        font-weight: 400;
        color: rgba(255, 255, 255, 0.85);
      }
      .command-row.selected .label {
        color: #fff;
      }
      .command-row .hint {
        font-size: var(--font-size-x-small);
        color: rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        animation: pulse-dot 2s ease-in-out infinite;
      }

      .status-dot.connected {
        background: var(--success);
        box-shadow: 0 0 4px var(--success);
      }

      .status-dot.disconnected {
        background: var(--error);
        box-shadow: 0 0 4px var(--error);
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* ── Result panel ───────────────── */

      .result-panel {
        display: none;
        border-top: 0.5px solid var(--border);
        padding: 12px 14px;
        max-height: 140px;
        overflow-y: auto;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: var(--font-size-x-small);
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.55);
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(0, 0, 0, 0.12);
      }

      .result-panel.visible {
        display: block;
        animation: fadeIn 0.15s ease;
      }

      /* ── Telegram panel ─────────────── */

      .telegram-form {
        display: none;
        border-top: 0.5px solid var(--border);
        padding: 12px;
        background: rgba(0, 0, 0, 0.12);
        animation: fadeIn 0.15s ease;
        flex: 1;
        overflow-y: auto;
      }

      .telegram-form.visible {
        display: flex;
        flex-direction: column;
      }

      .tg-section-title {
        font-size: var(--font-size-micro);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 8px;
        padding: 0 4px;
      }

      /* ── Bot card ────────────────────── */

      .bot-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 8px;
        transition: background 0.12s ease;
      }

      .bot-card:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .bot-avatar {
        width: 40px;
        height: 40px;
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
      }

      .bot-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: var(--radius);
      }

      .bot-avatar svg {
        width: 20px;
        height: 20px;
      }

      .bot-info {
        flex: 1;
        min-width: 0;
      }

      .bot-name {
        font-size: var(--font-size-label);
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bot-meta {
        font-size: var(--font-size-x-small);
        color: rgba(255, 255, 255, 0.35);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
      }

      .bot-status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
        flex-shrink: 0;
      }

      .bot-status-dot.offline {
        background: rgba(255, 255, 255, 0.2);
      }

      .bot-actions {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      .bot-action-btn {
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s ease;
      }

      .bot-action-btn:hover {
        background: var(--border);
        color: rgba(255, 255, 255, 0.6);
      }

      .bot-action-btn.danger:hover {
        background: rgba(248, 113, 113, 0.12);
        color: var(--error);
      }

      .bot-action-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── Add bot button ──────────────── */

      .add-bot-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 12px;
        background: transparent;
        border: 1.5px dashed var(--border);
        border-radius: var(--radius);
        color: rgba(255, 255, 255, 0.25);
        font-size: var(--font-size-small);
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        width: 100%;
        margin-top: 4px;
      }

      .add-bot-btn:hover {
        border-color: rgba(39, 167, 231, 0.3);
        color: rgba(39, 167, 231, 0.7);
        background: rgba(39, 167, 231, 0.04);
      }

      .add-bot-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── Connect form ────────────────── */

      .tg-connect-form {
        display: none;
        margin-top: 8px;
      }
      .tg-connect-form.visible {
        display: block;
        animation: fadeIn 0.15s ease;
      }

      .form-field {
        margin-bottom: 10px;
      }

      .form-field label {
        display: block;
        font-size: var(--font-size-x-small);
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
      }

      .form-field input {
        width: 100%;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 0.5px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: var(--font-size-label);
        font-family: 'SF Mono', 'Fira Code', monospace;
        outline: none;
        transition: border-color 0.15s ease;
        box-sizing: border-box;
      }

      .form-field input:focus {
        border-color: rgba(255, 255, 255, 0.25);
      }
      .form-field input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .form-field .field-hint {
        font-size: var(--font-size-micro);
        color: rgba(255, 255, 255, 0.25);
        margin-top: 4px;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .form-btn {
        padding: 6px 14px;
        border-radius: 9999px;
        font-size: var(--font-size-small);
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .form-btn-primary {
        background: #27a7e7;
        color: white;
      }

      .form-btn-primary:hover {
        background: #1e96d4;
      }

      .form-btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .form-btn-cancel {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.5);
        border: 0.5px solid var(--border);
      }

      .form-btn-cancel:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .form-status {
        font-size: var(--font-size-small);
        margin-top: 8px;
        display: none;
      }

      .form-status.visible {
        display: block;
      }
      .form-status.error {
        color: var(--error);
      }
      .form-status.success {
        color: var(--success);
      }

      /* ── Section header ───────────────── */

      .section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px 4px;
        font-size: var(--font-size-micro);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255, 255, 255, 0.2);
      }

      .section-header .section-line {
        flex: 1;
        height: 0.5px;
        background: rgba(255, 255, 255, 0.06);
      }

      /* ── Footer ─────────────────────── */

      .footer {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-top: 0.5px solid rgba(255, 255, 255, 0.06);
        font-size: var(--font-size-x-small);
        color: rgba(255, 255, 255, 0.2);
        margin-top: auto;
        flex-shrink: 0;
        min-height: 40px;
      }

      .footer kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        padding: 1px 4px;
        background: rgba(255, 255, 255, 0.06);
        border: 0.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        font-size: var(--font-size-micro);
        font-family: inherit;
        color: rgba(255, 255, 255, 0.35);
      }

      .footer span {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .footer .brand-label {
        font-weight: 500;
        font-size: var(--font-size-micro);
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.2);
      }

      .settings-btn {
        width: 24px;
        height: 24px;
        border: none;
        border-radius: var(--radius-sm);
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin-right: -4px;
        transition: background 0.1s ease;
        flex-shrink: 0;
      }

      .settings-btn:hover {
        background: var(--border);
      }

      .settings-btn.active {
        background: rgba(255, 255, 255, 0.1);
      }

      .settings-btn svg {
        width: 14px;
        height: 14px;
      }

      .empty-state {
        padding: 24px;
        text-align: center;
        color: rgba(255, 255, 255, 0.25);
        font-size: var(--font-size-label);
        display: none;
      }

      /* ── Language panel ──────────────── */

      .language-panel {
        display: none;
        border-top: 0.5px solid var(--border);
        padding: 12px;
        background: rgba(0, 0, 0, 0.12);
        animation: fadeIn 0.15s ease;
        flex: 1;
        overflow: hidden;
        flex-direction: column;
      }

      .language-panel.visible {
        display: flex;
      }

      .language-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .language-list::-webkit-scrollbar {
        width: 3px;
      }
      .language-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .language-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .lang-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.08s ease;
        font-size: var(--font-size-label);
        color: rgba(255, 255, 255, 0.75);
        flex-shrink: 0;
      }

      .lang-option:hover {
        background: var(--border);
      }

      .lang-option.active {
        background: rgba(3, 139, 154, 0.15);
        color: var(--accent);
      }

      .lang-option .lang-check {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        opacity: 0;
      }

      .lang-option.active .lang-check {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="palette">
      <div class="search-bar">
        <div class="search-icon hidden" id="back-btn">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M15 18l-6-6 6-6"
              stroke="rgba(255,255,255,0.5)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <input type="text" id="search" data-i18n-placeholder="palette.searchPlaceholder" placeholder="Search commands..." autofocus />
      </div>
      <div class="command-list" id="command-list"></div>
      <div class="empty-state" id="empty-state" data-i18n="palette.noResults">No matching commands</div>
      <div class="result-panel" id="result-panel"></div>

      <!-- Telegram panel -->
      <div class="telegram-form" id="telegram-form">
        <div class="tg-section-title" data-i18n="palette.connectedBots">Connected Bots</div>

        <!-- Bot cards container -->
        <div id="tg-bot-list"></div>

        <!-- Add bot button -->
        <button class="add-bot-btn" id="tg-add-btn">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M12 5v14M5 12h14"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <span data-i18n="palette.addBot">Add Bot</span>
        </button>

        <!-- Connect form (hidden by default) -->
        <div class="tg-connect-form" id="tg-form-fields">
          <div class="form-field">
            <label data-i18n="palette.yourUserId">Your User ID</label>
            <input
              type="text"
              id="tg-userid"
              placeholder="123456789"
              inputmode="numeric"
              autocomplete="off"
            />
            <div class="field-hint" data-i18n="palette.userIdHint">Get from @userinfobot on Telegram</div>
          </div>
          <div class="form-field">
            <label data-i18n="palette.botToken">Bot Token</label>
            <input type="password" id="tg-token" placeholder="123456:ABC-DEF..." />
            <div class="field-hint" data-i18n="palette.botTokenHint">Get from @BotFather on Telegram</div>
          </div>
          <div class="form-status" id="tg-status"></div>
          <div class="form-actions">
            <button class="form-btn form-btn-cancel" id="tg-cancel" data-i18n="palette.cancel">Cancel</button>
            <button class="form-btn form-btn-primary" id="tg-submit" disabled data-i18n="palette.connect">Connect</button>
          </div>
        </div>
      </div>

      <!-- Language panel -->
      <div class="language-panel" id="language-panel">
        <div class="tg-section-title" data-i18n="palette.interfaceLanguage">Interface Language</div>
        <div class="language-list" id="language-list"></div>
      </div>

      <div class="footer">
        <span style="display: flex; align-items: center; gap: 4px; flex: 1;">
          <img src="/icons/sauria-logo-40.png" alt="" style="width: 12px; height: 12px; border-radius: 2px;" />
          <span class="brand-label">Sauria</span>
        </span>
        <button class="settings-btn" id="settings-btn" title="Developer settings">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"
              stroke="rgba(255,255,255,0.3)"
              stroke-width="1.5"
            />
            <circle cx="12" cy="12" r="3" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />
          </svg>
        </button>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
